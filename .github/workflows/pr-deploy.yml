name: PR Build Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

env:
  DOCKER_IMAGE_PREFIX: trendastana

jobs:
  pr_build_check:
    name: PR Build Check (develop -> main)
    if: github.head_ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -t $DOCKER_IMAGE_PREFIX/api:pr-${{ github.sha }} ./apps/api

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://trendbuy.kz \
            -t $DOCKER_IMAGE_PREFIX/web:pr-${{ github.sha }} \
            ./apps/web
