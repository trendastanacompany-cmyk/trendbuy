name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.REGISTRY }}/trendbuy-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          build-args: NEXT_PUBLIC_API_URL=https://trendbuy.kz
          tags: ${{ env.REGISTRY }}/trendbuy-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            test -f .env
            test -f docker-compose.release.yml

            # Login to ghcr.io
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            git pull origin main

            # Pull new images (only api and web — nginx/postgres unchanged)
            REGISTRY=ghcr.io/${{ github.repository_owner }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose -f docker-compose.release.yml pull api web

            # Start services with new images
            REGISTRY=ghcr.io/${{ github.repository_owner }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose -f docker-compose.release.yml up -d --remove-orphans

            # Free disk: remove all images not used by running containers
            docker image prune -af

            # Reload nginx config if running
            docker compose -f docker-compose.release.yml \
              exec -T nginx nginx -s reload 2>/dev/null || true

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            for i in $(seq 1 40); do
              API=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' trendastana_api 2>/dev/null || echo missing)
              WEB=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' trendastana_web 2>/dev/null || echo missing)
              echo "[$i/40] api=$API  web=$WEB"
              [ "$API" = "healthy" ] && [ "$WEB" = "healthy" ] && echo "Deploy complete." && exit 0
              sleep 5
            done
            echo "Timeout. Logs:"
            docker compose -f docker-compose.release.yml logs --tail=80 api web
            exit 1
