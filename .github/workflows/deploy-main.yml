name: Deploy Main

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  DOCKER_IMAGE_PREFIX: trendastana

jobs:
  deploy:
    name: Build Archive And Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build release Docker images
        run: |
          docker build -t $DOCKER_IMAGE_PREFIX/api:${{ github.sha }} ./apps/api
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://trendbuy.kz/api \
            -t $DOCKER_IMAGE_PREFIX/web:${{ github.sha }} \
            ./apps/web

      - name: Pack Docker images to archive
        run: |
          mkdir -p dist
          docker save $DOCKER_IMAGE_PREFIX/api:${{ github.sha }} $DOCKER_IMAGE_PREFIX/web:${{ github.sha }} | gzip > dist/release-${{ github.sha }}.tar.gz

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/release-${{ github.sha }}.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/releases
          strip_components: 1
          overwrite: true

      - name: Load archive and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            test -f .env
            git pull origin main
            test -f docker-compose.release.yml
            test -f scripts/deploy-release.sh
            COMPOSE_FILE=docker-compose.release.yml \
            IMAGE_TAG=${{ github.sha }} \
            DOCKER_IMAGE_PREFIX=${{ env.DOCKER_IMAGE_PREFIX }} \
            RELEASE_ARCHIVE=releases/release-${{ github.sha }}.tar.gz \
            CLEAN_RELEASE_ARCHIVE=1 \
            SKIP_PULL=1 \
            PRUNE_PROJECT_IMAGES=1 \
            bash scripts/deploy-release.sh

            for i in $(seq 1 30); do
              API_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' trendastana_api)
              WEB_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' trendastana_web)
              echo "Attempt $i: api=$API_STATUS web=$WEB_STATUS"

              if [ "$API_STATUS" = "healthy" ] && [ "$WEB_STATUS" = "healthy" ]; then
                echo "Services are healthy."
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "Healthcheck timeout. Dumping logs..."
                docker compose -f docker-compose.release.yml ps
                docker compose -f docker-compose.release.yml logs --tail=200 api
                docker compose -f docker-compose.release.yml logs --tail=200 web
                docker compose -f docker-compose.release.yml logs --tail=200 nginx
                exit 1
              fi

              sleep 5
            done

            echo "Deploy completed for ${{ github.sha }}"
