# ── HTTP: redirect to HTTPS + certbot challenge ────────────────
server {
    listen 80;
    server_name trendbuy.kz www.trendbuy.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name trendbuy.kz www.trendbuy.kz;

    ssl_certificate     /etc/letsencrypt/live/trendbuy.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trendbuy.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Admin API proxy: goes through Next.js (injects secret key) ──
    location /api/admin/ {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ── Public API ──────────────────────────────────────────────
    location /api/ {
        set $upstream_api http://api:3001;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded files ──────────────────────────────────────────
    location ^~ /uploads/ {
        set $upstream_api http://api:3001;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Next.js static assets (immutable, 1 year) ──────────────
    location /_next/static/ {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public static files ─────────────────────────────────────
    location ~* \.(ico|svg|png|jpg|jpeg|webp|woff2?|ttf|css|js)$ {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Next.js app ─────────────────────────────────────────────
    location / {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
