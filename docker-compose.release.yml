services:
  postgres:
    image: postgres:16-alpine
    container_name: trendastana_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    image: ${DOCKER_IMAGE_PREFIX:-trendastana}/api:${IMAGE_TAG:-latest}
    container_name: trendastana_api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SYNC: "false"
      PORT: 3001
      NODE_ENV: production
    depends_on:
      - postgres
    networks:
      - internal
      - external
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    image: ${DOCKER_IMAGE_PREFIX:-trendastana}/web:${IMAGE_TAG:-latest}
    container_name: trendastana_web
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_API_URL: https://trendbuy.kz
    networks:
      - external
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/admin.html', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: trendastana_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - external

  certbot:
    image: certbot/certbot
    container_name: trendastana_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
