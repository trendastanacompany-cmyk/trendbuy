services:
  postgres:
    image: postgres:16-alpine
    container_name: trendastana_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    image: ${DOCKER_IMAGE_PREFIX:-trendastana}/api:${IMAGE_TAG:-latest}
    container_name: trendastana_api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SYNC: "false"
      PORT: 3001
      NODE_ENV: production
    depends_on:
      - postgres
    networks:
      - internal
      - external
    volumes:
      - uploads_data:/app/uploads

  web:
    image: ${DOCKER_IMAGE_PREFIX:-trendastana}/web:${IMAGE_TAG:-latest}
    container_name: trendastana_web
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - external

  nginx:
    image: nginx:alpine
    container_name: trendastana_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - external

  certbot:
    image: certbot/certbot
    container_name: trendastana_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
